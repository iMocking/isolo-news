<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#151c2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff2d95;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background square with rounded corners -->
  <rect x="2" y="2" width="60" height="60" rx="12" ry="12" fill="url(#bgGradient)" stroke="#1e2a45" stroke-width="1"/>
  
  <!-- Outer circuit frame -->
  <rect x="8" y="8" width="48" height="48" rx="8" ry="8" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Corner brackets - HUD style -->
  <path d="M 8 16 L 8 8 L 16 8" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 56 16 L 56 8 L 48 8" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 8 48 L 8 56 L 16 56" fill="none" stroke="#ff2d95" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 56 48 L 56 56 L 48 56" fill="none" stroke="#ff2d95" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Central N letter - stylized -->
  <g filter="url(#glow)">
    <!-- Left vertical bar -->
    <rect x="20" y="18" width="4" height="28" rx="2" fill="url(#accentGradient)"/>
    <!-- Diagonal bar -->
    <path d="M 24 18 L 40 46 L 36 46 L 20 22 L 24 22 Z" fill="url(#accentGradient)"/>
    <!-- Right vertical bar -->
    <rect x="40" y="18" width="4" height="28" rx="2" fill="url(#accentGradient)"/>
  </g>
  
  <!-- Data dots - representing information/intel -->
  <circle cx="26" cy="52" r="1.5" fill="#00ff88" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="52" r="1.5" fill="#00f0ff" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="38" cy="52" r="1.5" fill="#ff2d95" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Scan line effect -->
  <rect x="8" y="8" width="48" height="2" fill="#00f0ff" opacity="0.3">
    <animate attributeName="y" values="8;54;8" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
